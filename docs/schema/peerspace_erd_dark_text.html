
<style>
#erd2 { width: 100%; overflow-x: auto; }
#erd2 svg { max-width: none !important; }
#erd2 svg text, #erd2 svg tspan { fill: #111111 !important; }
#erd2 svg .edgeLabel text, #erd2 svg .edgeLabel tspan { fill: #111111 !important; }
.erd-legend2 { display: flex; gap: 20px; flex-wrap: wrap; margin: 12px 0 4px; font-size: 12px; color: var(--color-text-secondary); }
.erd-legend2 span { display: flex; align-items: center; gap: 6px; }
.dot2 { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>
<div class="erd-legend2">
  <span><span class="dot2" style="background:#534AB7"></span> Users &amp; access</span>
  <span><span class="dot2" style="background:#0F6E56"></span> Properties</span>
  <span><span class="dot2" style="background:#185FA5"></span> Bookings &amp; payments</span>
  <span><span class="dot2" style="background:#993C1D"></span> Reviews &amp; messages</span>
</div>
<div id="erd2"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: false,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: '#444444',
    textColor: '#111111',
    primaryColor: '#EEEDFE',
    primaryBorderColor: '#534AB7',
    primaryTextColor: '#111111',
    secondaryColor: '#E1F5EE',
    secondaryBorderColor: '#0F6E56',
    secondaryTextColor: '#111111',
    tertiaryColor: '#E6F1FB',
    tertiaryBorderColor: '#185FA5',
    tertiaryTextColor: '#111111',
    edgeLabelBackground: '#ffffff',
    attributeBackgroundColorEven: '#f9f9f9',
    attributeBackgroundColorOdd: '#ffffff',
  },
});

const diagram = `erDiagram
  USERS {
    int id PK
    uuid uid UK
    string username
    string email
    string password
    string firstname
    string lastname
    timestamp created_at
    timestamp deleted_at
  }
  ROLES {
    int role_id PK
    string name
  }
  USERS_ROLES {
    uuid uid FK
    int role_id FK
  }
  CAPABILITIES {
    int capability_id PK
    string name
    string description
  }
  ROLES_CAPABILITIES {
    int role_id FK
    int capability_id FK
  }
  PROPERTIES {
    int id PK
    uuid host_id FK
    string title
    string city
    string address
    string status
    decimal hourly_rate
    decimal half_day_rate
    string type
    timestamp created_at
  }
  PROPERTY_IMAGES {
    int id PK
    int property_id FK
    string url
    boolean is_main
    int display_order
  }
  BLOCKED_SLOTS {
    int id PK
    int property_id FK
    timestamp start_datetime
    timestamp end_datetime
    string reason
  }
  AMENITIES {
    int id PK
    string name
    string icon_url
  }
  PROPERTIES_AMENITIES {
    int property_id FK
    int amenity_id FK
  }
  BOOKINGS {
    int id PK
    int property_id FK
    uuid guest_id FK
    timestamp start_datetime
    timestamp end_datetime
    decimal subtotal
    decimal host_fee
    decimal guest_fee
    decimal total_amount
    decimal host_payout
    string status
    timestamp cancelation_date
  }
  PAYMENTS {
    int id PK
    int booking_id FK
    decimal amount
    string currency
    string status
    string method
    timestamp paid_at
    decimal refund_amount
  }
  MESSAGES {
    int id PK
    int booking_id FK
    uuid sender_id FK
    text content
  }
  REVIEWS {
    int id PK
    int booking_id FK
    uuid reviewer_id FK
    uuid reviewee_id FK
    string reviewer_role
    int rating
    text comment
    boolean is_public
  }

  USERS ||--o{ USERS_ROLES : "assigned"
  ROLES ||--o{ USERS_ROLES : "has"
  ROLES ||--o{ ROLES_CAPABILITIES : "grants"
  CAPABILITIES ||--o{ ROLES_CAPABILITIES : "in"
  USERS ||--o{ PROPERTIES : "hosts"
  PROPERTIES ||--o{ PROPERTY_IMAGES : "has"
  PROPERTIES ||--o{ BLOCKED_SLOTS : "blocks"
  PROPERTIES ||--o{ PROPERTIES_AMENITIES : "features"
  AMENITIES ||--o{ PROPERTIES_AMENITIES : "in"
  PROPERTIES ||--o{ BOOKINGS : "receives"
  USERS ||--o{ BOOKINGS : "makes"
  BOOKINGS ||--o{ PAYMENTS : "generates"
  BOOKINGS ||--o{ MESSAGES : "contains"
  BOOKINGS ||--o{ REVIEWS : "receives"
  USERS ||--o{ REVIEWS : "writes"
  USERS ||--o{ REVIEWS : "receives"
  USERS ||--o{ MESSAGES : "sends"
`;

const { svg } = await mermaid.render('erd-svg2', diagram);
document.getElementById('erd2').innerHTML = svg;

document.querySelectorAll('#erd2 svg text, #erd2 svg tspan').forEach(el => {
  el.style.fill = '#111111';
});

document.querySelectorAll('#erd2 svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd2 svg .row-rect-odd path, #erd2 svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});

setTimeout(() => {
  document.querySelectorAll('#erd2 svg text, #erd2 svg tspan').forEach(el => {
    el.style.fill = '#111111';
  });
}, 100);
</script>
